<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS Studios | Portfólio</title>
    <style>
    /* Definição de Cores Estilo VHS / GS Studios */
:root {
    /* MODO DIURNO (Baseado nas cores originais da logo) */
    --bg-principal: #7094ff;       /* O azul claro do losango de fundo */
    --bg-navbar: #4d79ff;          /* O azul de fundo da logo para camuflar */
    --cor-texto: #ffffff;          
    --cor-detaque-vhs: #ffde59;    /* O amarelo marcante das letras GS */
    --cor-links: #ffffff;
    --shadow-retro: 3px 3px 0px #000000;
}

.dark-mode {
    /* MODO NOTURNO (Estética Neon / Vaporwave / VHS de Madrugada) */
    --bg-principal: #1a1a2e;       /* Azul escuro profundo */
    --bg-navbar: #0f0f1b;          /* Quase preto */
    --cor-texto: #00f5ff;          /* Ciano neon */
    --cor-detaque-vhs: #ff007f;    /* Rosa neon */
    --cor-links: #a0aec0;
    --shadow-retro: 3px 3px 0px #ff007f;
}

/* Reset de página */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Courier New', Courier, monospace; /* Fonte estilo terminal/computador antigo */
    background-color: var(--bg-principal);
    color: var(--cor-texto);
    transition: background-color 0.8s ease, color 0.8s ease;
    overflow-x: hidden;
}

/* NAVBAR CUSTOMIZADA */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: var(--bg-navbar); /* Mesma cor da logo para camuflar */
    padding: 5px 30px; /* Reduzido para ajustar ao tamanho da logo */
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
    border-bottom: 3px solid #000000; /* Linha preta grossa estilo retro */
    transition: background-color 0.8s ease;
}

/* AJUSTE DA IMAGEM DA LOGO */
.nav-logo img {
    height: 55px; /* Altura ideal para não distorcer a barra */
    display: block;
    transition: transform 0.3s ease;
}

.nav-logo img:hover {
    transform: scale(1.05);
}

/* Links */
.nav-links {
    display: flex;
    gap: 30px;
}

.navbar a {
    color: var(--cor-links);
    text-decoration: none;
    font-size: 16px;
    font-weight: bold;
    text-transform: uppercase;
    transition: color 0.3s;
}

.navbar a:hover {
    color: var(--cor-detaque-vhs);
    text-shadow: 1px 1px 0px #000;
}

/* Controles do lado direito */
.nav-right {
    display: flex;
    align-items: center;
    gap: 20px;
}

/* Busca Retro */
.search-box input {
    padding: 6px 12px;
    border: 2px solid #000000;
    background-color: #ffffff;
    color: #000000;
    font-family: inherit;
    outline: none;
    box-shadow: 2px 2px 0px #000000;
}

.search-box button {
    background-color: var(--cor-detaque-vhs);
    border: 2px solid #000000;
    border-left: none;
    padding: 6px 10px;
    cursor: pointer;
    box-shadow: 2px 2px 0px #000000;
}

/* Botão de Tema */
.theme-btn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    transition: transform 0.3s;
}

/* Ícone de Usuário Estilo Pixel/Avatar */
.user-profile a {
    font-size: 14px;
    font-weight: bold;
    background-color: #000000;
    color: var(--cor-detaque-vhs);
    padding: 8px 10px;
    border: 2px solid var(--cor-detaque-vhs);
    text-decoration: none;
    box-shadow: var(--shadow-retro);
}

/* CONTEÚDO PRINCIPAL (Efeito VHS) */
.content-section {
    padding: 40px;
    margin-top: 120px;
    text-align: center;
}

.vhs-badge {
    background-color: #000000;
    color: #00ff00; /* Verde clássico de fita cassete */
    display: inline-block;
    padding: 5px 15px;
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 20px;
    border-radius: 3px;
    box-shadow: var(--shadow-retro);
    animation: piscar 1.5s infinite steps(2);
}

h1 {
    font-size: 3.5rem;
    letter-spacing: 4px;
    text-shadow: var(--shadow-retro);
    margin-bottom: 10px;
}

/* Animação para simular o "PLAY" piscando como fita antiga */
@keyframes piscar {
    0% { opacity: 1; }
    50% { opacity: 0; }
}
    </style>  
    <link rel="icon" type="image/png" href="logo.png">
    
    <link rel="stylesheet" href="style.css"> </head>
<body class="vhs-theme">

    <header class="navbar">
        <div class="nav-logo">
            <a href="#">
                <img src="logo.png" alt="GS Studios Logo">
            </a>
        </div>

        <nav class="nav-links">
            <a href="#sobre">Sobre</a>
            <a href="#trabalhos">Trabalhos</a>
            <a href="#servicos">Serviços</a>
            <a href="#contato">Contato</a>
        </nav>

        <div class="nav-right">
            <div class="search-box">
                <input type="text" placeholder="Buscar...">
                <button type="submit">🔍</button>
            </div>
            
            <button id="theme-toggle" class="theme-btn" title="Mudar efeito">☀️</button>
            
            <div class="user-profile">
                <a href="#perfil" title="Perfil do Usuário">GS</a>
            </div>
        </div>
    </header>

    <main class="content-section">
        <div class="vhs-badge">PLAY ▶</div>
        <h1>GS STUDIOS</h1>
        <p>Desenvolvimento de Jogos & Aplicações com Estética Retro.</p>
    </main>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        themeToggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            if (document.body.classList.contains('dark-mode')) {
                themeToggleBtn.textContent = '🌙';
            } else {
                themeToggleBtn.textContent = '☀️';
            }
        });
    </script>
</body>
</html>
